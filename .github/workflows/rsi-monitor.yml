name: RSI Monitor

on:
  schedule:
    - cron: '30 13 * * 1-5'   # 9:30 AM ET (13:30 UTC)
    - cron: '30 14 * * 1-5'   # 10:30 AM ET
    - cron: '30 15 * * 1-5'   # 11:30 AM ET
    - cron: '30 16 * * 1-5'   # 12:30 PM ET
    - cron: '30 17 * * 1-5'   # 1:30 PM ET
    - cron: '30 18 * * 1-5'   # 2:30 PM ET
    - cron: '30 19 * * 1-5'   # 3:30 PM ET
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: |
          python -m pip install --upgrade pip
          python -m pip install 'yfinance==0.2.36'
          python -m pip install 'ta==0.11.0'
          python -m pip install 'requests==2.31.0'
      - name: Run RSI Tracker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python rsi_tracker.py
